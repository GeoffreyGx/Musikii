name: Backend Pytest

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/pytest.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/pytest.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest